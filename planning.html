
<!DOCTYPE html>
<html>

<head>
    <title>XXXX Planner - Planning</title>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
</head>

<body>

    <h1>Planning</h1>

    <div id="myGrid" style="height:500px;"></div>

    <script>

        const columnDefs = [
            { field: "project" },
            { field: "resource" },
            { field: "jan", editable: true },
            { field: "feb", editable: true },
            { field: "mar", editable: true }
        ];

        const rowData = [
            { project: "P100", resource: "Bob", jan: 80, feb: 80, mar: 40 },
            { project: "P200", resource: "Jane", jan: 40, feb: 60, mar: 80 }
        ];

        const gridOptions = {
            columnDefs,
            rowData
        };

        agGrid.createGrid(
            document.querySelector("#myGrid"),
            gridOptions
        );

    </script>

</body>

</html>
