
!DOCTYPE html>
<html>
<head>
    <title>Planner</title>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">

    .jsdelivr.net/npm/ag-grid-community/styles/ag-theme-quartz.css">
</head>

<body>

<h1>Planning</h1>

<div id="myGrid"
     class="ag-theme-quartz"
     style="height:500px;width:100%;">
</div>

<script>

const columnDefs = [
    { field: "project" },
    { field: "resource" },
    { field: "jan", editable: true },
    { field: "feb", editable: true },
    { field: "mar", editable: true }
];

const rowData = [
    { project: "P100", resource: "Bob", jan: 80, feb: 80, mar: 40 },
    { project: "P200", resource: "Jane", jan: 40, feb: 60, mar: 80 }
];

const totalRow = {
    project: "TOTAL",
    resource: "",
    jan: rowData.reduce((sum, row) => sum + row.jan, 0),
    feb: rowData.reduce((sum, row) => sum + row.feb, 0),
    mar: rowData.reduce((sum, row) => sum + row.mar, 0)
};

rowData.push(totalRow);

const gridOptions = {
    columnDefs,
    rowData,
    theme: "legacy"
};

console.log("agGrid =", agGrid);

agGrid.createGrid(
    document.getElementById("myGrid"),
    gridOptions
);

</script>

</body>
</html>
