
<!DOCTYPE html>
<html>
<head>
    <title>Planner</title>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>


<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-quartz.css">


</head>

<body>

<h1>Planning</h1>

<div id="myGrid"
     class="ag-theme-quartz"
     style="height:500px;width:100%;">
</div>

<script>

const columnDefs = [
    { field: "programOwnerorSOWCategory", headerName: "Program Owner or SOW Category",pinned: "left", width:160, wrapHeaderText: true, autoHeight: true},
    {field: "SOW", pinned: "left", width:100},
    { field: "projectID", pinned: "left", width:100},
    { field: "taskID", pinned: "left", width:100},
    { field: "productLine",headerName: "Product Line", pinned: "left", width:100, wrapHeaderText: true, autoHeight: true},
    { field: "unitType",pinned: "left", width:100, editable: true,
    cellEditor: "agSelectCellEditor",
    cellEditorParams: {
        values: ["Hours", "FTE", "Dollars"]
     }},
    { headerName: "Q1",
        children: [
    { field: "jan", editable: true },
    { field: "feb", editable: true },
    { field: "mar", editable: true },]},
{ headerName: "Q2",
        children: [
    { field: "apr", editable: true },
    { field: "may", editable: true },
    { field: "jun", editable: true },]},
{ headerName: "Q3",
        children: [
    { field: "jul", editable: true },
    { field: "aug", editable: true },
    { field: "sept", editable: true },]},
{ headerName: "Q4",
        children: [
    { field: "oct", editable: true },
    { field: "nov", editable: true },
    { field: "dec", editable: true },]}
];


const rowData = [
    { projectID: "P100", programOwnerorSOWCategory: "Bob", jan: 80, feb: 80, mar: 40, apr: 27,may: 89, jun: 78, jul: 77, aug: 75, sept: 80, oct: 82, nov:83, dec:84},
    { projectID: "P200", programOwnerorSOWCategory: "Jane", jan: 40, feb: 60, mar: 80, apr: 27,may: 89, jun: 78, jul: 77, aug: 75, sept: 80, oct: 82, nov:83, dec:84}


];


function calculateTotalRow() {
    return {
        projectID: "TOTAL",
        programOwnerorSOWCategory: "",

        jan: rowData.reduce((sum, row) => sum + (row.jan || 0), 0),
        feb: rowData.reduce((sum, row) => sum + (row.feb || 0), 0),
        mar: rowData.reduce((sum, row) => sum + (row.mar || 0), 0),
        apr: rowData.reduce((sum, row) => sum + (row.apr || 0), 0),
        may: rowData.reduce((sum, row) => sum + (row.may || 0), 0),
        jun: rowData.reduce((sum, row) => sum + (row.jun || 0), 0),
        jul: rowData.reduce((sum, row) => sum + (row.jul || 0), 0),
        aug: rowData.reduce((sum, row) => sum + (row.aug || 0), 0),
        sept: rowData.reduce((sum, row) => sum + (row.sept || 0), 0),
        oct: rowData.reduce((sum, row) => sum + (row.oct || 0), 0),
        nov: rowData.reduce((sum, row) => sum + (row.nov || 0), 0),
        dec: rowData.reduce((sum, row) => sum + (row.dec || 0), 0)
    };
}

function updateTotals(gridApi) {
    gridApi.setGridOption(
        "pinnedTopRowData",
        [calculateTotalRow()]
    );
}

const totalRow = calculateTotalRow();

function formatValues(params) {
    const value = Number(params.value);

    if (isNaN(value)) {
        return "";
    }

    if (params.data?.unitType === "Dollars") {
        return value.toLocaleString();
    }

    if (params.data?.unitType === "FTE") {
        return value.toFixed(2);
    }

    if (params.data?.unitType === "Hours") {
        return value.toFixed(2);
    }

    return value;
}

const gridOptions = {
    columnDefs,
    rowData,
    pinnedTopRowData: [totalRow],
    theme: "legacy",

    defaultColDef: {
        width: 75,
        resizable: true
    },

    onCellValueChanged: params => {
        updateTotals(params.api);
    }
};


console.log("agGrid =", agGrid);

agGrid.createGrid(
    document.getElementById("myGrid"),
    gridOptions
);

</script>

</body>
</html>
